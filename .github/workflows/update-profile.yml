name: Update profile telemetry

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

concurrency:
  group: profile-telemetry
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Refresh profile SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_profile.py

      - name: Commit updated telemetry
        run: |
          if git diff --quiet -- assets/profile-dark.svg assets/profile-light.svg; then
            echo "Profile telemetry is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-dark.svg assets/profile-light.svg
          git commit -m "Update profile telemetry"
          git push
